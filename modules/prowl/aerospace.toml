# GENERATED WRAPPER — templated by modules/prowl/default.nix. The @TOKENS@
# below are filled from nebelhaus.prowl.apps (the app roster) and the resolved
# home path at build time; don't deploy this file directly. Everything OUTSIDE
# the tokens is the static, hand-tuned AeroSpace config.
after-login-command = []

after-startup-command = []

exec-on-workspace-change = [
    '@HOME@/.config/sketchybar/aerospace-notify.sh',
]

start-at-login = false

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 80

default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

on-focused-monitor-changed = []
automatically-unhide-macos-hidden-apps = true

[gaps]
inner.horizontal = [{ monitor."Built-in Retina Display" = 10 }, 20]
inner.vertical = [{ monitor."Built-in Retina Display" = 10 }, 20]
outer.left = [{ monitor."Built-in Retina Display" = 10 }, 20]
outer.bottom = [{ monitor."Built-in Retina Display" = 10 }, 20]
outer.top = [{ monitor."Built-in Retina Display" = 10 }, 40]
outer.right = [{ monitor."Built-in Retina Display" = 10 }, 20]

[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# Static tiling / workspace / layout / palette bindings — generated from
# modules/prowl/wm-bindings.nix, the SAME table that renders the pounce
# cheatsheet, so a binding and its caption can't drift. (resize ⌥⌘⌃⇧-/=,
# layouts ⌥/ ⌥,, move-window-to-workspace ⌥⇧1-4, fullscreen ⌥f, back-and-forth
# ⌥⇥, move-workspace ⌥⇧⇥, resort ⌥⇧r, palette ⌘space.) Moving focus/windows and
# focusing workspaces 1-4 are caps-leader actions — see [mode.launch.binding]
# below (arrow → navigate mode where arrows focus and ⇧+arrow moves, digit →
# workspace).
@MAIN_STATIC@
# App-workspace throws (⌥⇧<key>) — generated from nebelhaus.prowl.apps.
@MAIN_MOVES@
# App launchers — hyper (caps lock, = cmd-alt-ctrl-shift) + letter. Generated
# from nebelhaus.prowl.apps. launch.sh switches to the assigned workspace first,
# then opens/focuses the app (no workspace arg = open/focus in place). These
# physical cmd-alt-ctrl-shift chords are a fallback for when useNativeHyper is
# off; the caps-tap leader below is the usual path.
@HYPER_CHORDS@
# Leader: Caps Lock is remapped to F18 (see configuration.nix useNativeHyper).
# Tap caps -> enter `launch` mode -> letter -> open app. The hyper chords above
# stay as a fallback for when useNativeHyper is flipped off.
f18 = ['mode launch', 'exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh on']

# ⌘space (palette), ⌥f, ⌥⇥, ⌥⇧⇥, ⌥⇧r are part of the generated static block
# above (modules/prowl/wm-bindings.nix). Only the mode-entry chord stays here —
# it's structural plumbing, not a tiling command, so it isn't on the cheatsheet.
alt-shift-semicolon = 'mode service'

# Service-mode bindings (flatten, float, close-others, join-with, volume) —
# generated from modules/prowl/wm-bindings.nix, same table as the cheatsheet.
[mode.service.binding]
@SERVICE_STATIC@
# Launch leader mode (entered by tapping caps -> F18). Each letter mirrors the
# hyper chords above, then drops back to main. esc / any unbound key + esc to
# bail out without launching anything.
[mode.launch.binding]
esc = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'mode main']
slash = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget @BIN@/pounce --cheatsheet ~/.config/pounce/cheatsheet.json', 'mode main']
# Numbered workspaces 1-4 focus off the same leader — caps then a digit, exactly
# like caps then a letter jumps to an app's workspace. (Moving a window to one is
# still ⌥⇧1-4 in main mode, mirroring the app-workspace throws.)
1 = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'workspace 1', 'mode main']
2 = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'workspace 2', 'mode main']
3 = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'workspace 3', 'mode main']
4 = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'workspace 4', 'mode main']
# Non-launch leader actions. v = clipboard history; e = emoji picker.
# (palette is on cmd+space now, so the old space->palette leader is gone.)
v = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget @BIN@/pounce --clipboard', 'mode main']
e = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget @BIN@/pounce --emoji', 'mode main']
# - / = resize the focused tiled window (growing it shrinks its neighbour). The
# first press also drops into `resize` mode so further -/= repeat without re-tapping caps.
minus = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget @HOME@/.config/sketchybar/plugins/resize_mode.sh on', 'resize smart -50', 'mode resize']
equal = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget @HOME@/.config/sketchybar/plugins/resize_mode.sh on', 'resize smart +50', 'mode resize']
# Arrow keys move focus and drop into `navigate` mode, so further arrows repeat
# without re-tapping caps (⇧+arrow moves the window). This is the no-vim focus
# path — same first-press-acts-then-sticks shape as -/= → resize above.
left  = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget @HOME@/.config/sketchybar/plugins/navigate_mode.sh on', 'focus left',  'mode navigate']
down  = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget @HOME@/.config/sketchybar/plugins/navigate_mode.sh on', 'focus down',  'mode navigate']
up    = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget @HOME@/.config/sketchybar/plugins/navigate_mode.sh on', 'focus up',    'mode navigate']
right = ['exec-and-forget @HOME@/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget @HOME@/.config/sketchybar/plugins/navigate_mode.sh on', 'focus right', 'mode navigate']
# App launcher letters — generated from nebelhaus.prowl.apps.
@LAUNCH_LETTERS@
# Resize mode (entered via the launch leader's -/=). Repeat -/= to keep
# growing/shrinking the focused tiled window; esc/enter to return to main.
[mode.resize.binding]
minus = 'resize smart -50'
equal = 'resize smart +50'
esc = ['exec-and-forget @HOME@/.config/sketchybar/plugins/resize_mode.sh off', 'mode main']
enter = ['exec-and-forget @HOME@/.config/sketchybar/plugins/resize_mode.sh off', 'mode main']

# Navigate mode (entered via the launch leader's arrow keys). Arrows keep moving
# focus; ⇧+arrow moves the focused window in that direction; esc/enter returns to
# main. The no-vim replacement for the old ⌥hjkl focus chords — arrows can't be
# a bare main-mode chord (⌥/⌘/⌃ + arrow are all macOS text-nav), so focus lives
# behind the caps leader where nothing collides.
[mode.navigate.binding]
left  = 'focus left'
down  = 'focus down'
up    = 'focus up'
right = 'focus right'
shift-left  = 'move left'
shift-down  = 'move down'
shift-up    = 'move up'
shift-right = 'move right'
esc = ['exec-and-forget @HOME@/.config/sketchybar/plugins/navigate_mode.sh off', 'mode main']
enter = ['exec-and-forget @HOME@/.config/sketchybar/plugins/navigate_mode.sh off', 'mode main']

# Ghostty routing. Title matching races window detection (the AX title lands
# after the window is mapped), so popup windows (peek, rebuild) used to get
# tiled for a beat — reflowing the whole workspace — before any float rule
# could win. Instead: every ghostty window spawned at runtime floats (floating
# never reflows the tiles), and regular terminal windows tile themselves onto
# workspace T from inside zellij/launch.sh, which knows what it is with
# certainty. At aerospace (re)start, existing windows go straight to T tiled,
# same as before. (Ghostty's workspace lives in the roster but its window rules
# are bespoke, so the generated auto-assign block below skips it.)
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.during-aerospace-startup = true
run = 'move-node-to-workspace T'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'layout floating'

# App window auto-assignment — generated from nebelhaus.prowl.apps.
@WINDOW_RULES@
[[on-window-detected]]
if.app-id = 'com.apple.FaceTime'
run = 'layout floating'
