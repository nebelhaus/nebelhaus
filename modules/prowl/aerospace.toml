after-login-command = []

after-startup-command = []

exec-on-workspace-change = [
    '/Users/julienmartel/.config/sketchybar/aerospace-notify.sh',
    '/Users/julienmartel/.config/aerospace/cap-follow.sh',
]

start-at-login = false

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 80

default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

on-focused-monitor-changed = []
automatically-unhide-macos-hidden-apps = true

[gaps]
inner.horizontal = [{ monitor."Built-in Retina Display" = 10 }, 20]
inner.vertical = [{ monitor."Built-in Retina Display" = 10 }, 20]
outer.left = [{ monitor."Built-in Retina Display" = 10 }, 20]
outer.bottom = [{ monitor."Built-in Retina Display" = 10 }, 20]
outer.top = [{ monitor."Built-in Retina Display" = 10 }, 40]
outer.right = [{ monitor."Built-in Retina Display" = 10 }, 20]

[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
#                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
#                   backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-cmd-ctrl-left = 'move left'
alt-shift-cmd-ctrl-down = 'move down'
alt-shift-cmd-ctrl-up = 'move up'
alt-shift-cmd-ctrl-right = 'move right'

alt-shift-cmd-ctrl-minus = 'resize smart -50'
alt-shift-cmd-ctrl-equal = 'resize smart +50'

# 1
alt-1 = 'workspace 1'
alt-shift-1 = 'move-node-to-workspace 1'
# 2
alt-2 = 'workspace 2'
alt-shift-2 = 'move-node-to-workspace 2'
# 3
alt-3 = 'workspace 3'
alt-shift-3 = 'move-node-to-workspace 3'
# 4
alt-4 = 'workspace 4'
alt-shift-4 = 'move-node-to-workspace 4'
# Terminal
alt-shift-t = 'move-node-to-workspace T'
# Notes
alt-shift-n = 'move-node-to-workspace N'
# Slack
alt-shift-s = 'move-node-to-workspace S'
# Browser
alt-shift-b = 'move-node-to-workspace B'
# Figma
alt-shift-f = 'move-node-to-workspace F'
# Music
alt-shift-m = 'move-node-to-workspace M'
# AI
alt-shift-a = 'move-node-to-workspace AI'
# Swather
alt-shift-h = 'move-node-to-workspace H'
# Claude
alt-shift-c = 'move-node-to-workspace C'
# Notion Calendar
alt-shift-d = 'move-node-to-workspace D'

# App launchers — hyper (caps lock, = cmd-alt-ctrl-shift) + letter.
# launch.sh switches to the assigned workspace first, then opens/focuses the
# app (no workspace arg = open/focus in the current workspace). These physical
# cmd-alt-ctrl-shift chords are a fallback for when useNativeHyper is off; the
# caps-tap leader below is the usual path.
cmd-alt-ctrl-shift-t = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Ghostty" T'
cmd-alt-ctrl-shift-s = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Slack" S'
cmd-alt-ctrl-shift-b = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Zen" B'
cmd-alt-ctrl-shift-f = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Figma" F'
cmd-alt-ctrl-shift-m = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Music" M'
cmd-alt-ctrl-shift-h = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Swather" H'
cmd-alt-ctrl-shift-c = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Claude" C'
cmd-alt-ctrl-shift-d = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Notion Calendar" D'
cmd-alt-ctrl-shift-n = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Obsidian" N'
cmd-alt-ctrl-shift-r = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Things3" R'
# Unassigned — opens/focuses in the current workspace (no workspace switch).
cmd-alt-ctrl-shift-p = 'exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Passwords"'

# Leader: Caps Lock is remapped to F18 (see configuration.nix useNativeHyper).
# Tap caps -> enter `launch` mode -> letter -> open app. The hyper chords above
# stay as a fallback for when useNativeHyper is flipped off.
f18 = ['mode launch', 'exec-and-forget /Users/julienmartel/.config/sketchybar/plugins/launch_mode.sh on']

# cmd+space opens the command palette directly (macOS Spotlight's cmd+space is
# disabled in Keyboard settings). A direct alternative to the caps -> space leader.
cmd-space = 'exec-and-forget /etc/profiles/per-user/julienmartel/bin/pounce-palette'

alt-f = 'fullscreen'

# Re-apply on-window-detected workspace assignments (manual recovery from
# macOS wake-up window pile-up). Also runs automatically on wake via
# sleepwatcher.
alt-shift-r = 'exec-and-forget /Users/julienmartel/.config/aerospace/resort-windows.sh'

alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

alt-shift-semicolon = 'mode service'
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

down = 'volume down'
up = 'volume up'
shift-down = ['volume set 0', 'mode main']

# Launch leader mode (entered by tapping caps -> F18). Each letter mirrors the
# hyper chords above, then drops back to main. esc / any unbound key + esc to
# bail out without launching anything.
[mode.launch.binding]
esc = ['exec-and-forget /Users/julienmartel/.config/sketchybar/plugins/launch_mode.sh off', 'mode main']
# Non-launch leader actions. v = clipboard history; e = emoji picker.
# (palette is on cmd+space now, so the old space->palette leader is gone.)
v = ['exec-and-forget /Users/julienmartel/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget /etc/profiles/per-user/julienmartel/bin/pounce --clipboard', 'mode main']
e = ['exec-and-forget /Users/julienmartel/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget /etc/profiles/per-user/julienmartel/bin/pounce --emoji', 'mode main']
# - / = resize the focused tiled window (growing it shrinks its neighbour). The
# first press also drops into `resize` mode so further -/= repeat without re-tapping caps.
minus = ['exec-and-forget /Users/julienmartel/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget /Users/julienmartel/.config/sketchybar/plugins/resize_mode.sh on', 'resize smart -50', 'mode resize']
equal = ['exec-and-forget /Users/julienmartel/.config/sketchybar/plugins/launch_mode.sh off', 'exec-and-forget /Users/julienmartel/.config/sketchybar/plugins/resize_mode.sh on', 'resize smart +50', 'mode resize']
t = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Ghostty" T', 'mode main']
s = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Slack" S', 'mode main']
b = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Zen" B', 'mode main']
f = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Figma" F', 'mode main']
m = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Music" M', 'mode main']
h = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Swather" H', 'mode main']
c = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Claude" C', 'mode main']
d = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Notion Calendar" D', 'mode main']
n = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Obsidian" N', 'mode main']
r = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Things3" R', 'mode main']
p = ['exec-and-forget /Users/julienmartel/.config/aerospace/launch.sh "Passwords"', 'mode main']

# Resize mode (entered via the launch leader's -/=). Repeat -/= to keep
# growing/shrinking the focused tiled window; esc/enter to return to main.
[mode.resize.binding]
minus = 'resize smart -50'
equal = 'resize smart +50'
esc = ['exec-and-forget /Users/julienmartel/.config/sketchybar/plugins/resize_mode.sh off', 'mode main']
enter = ['exec-and-forget /Users/julienmartel/.config/sketchybar/plugins/resize_mode.sh off', 'mode main']

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = 'quick-terminal'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = 'quick-terminal-rebuild'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
if.window-title-regex-substring = '^(?!quick-terminal).*$'
run = 'move-node-to-workspace T'

[[on-window-detected]]
if.app-id = 'com.culturedcode.ThingsMac'
run = 'move-node-to-workspace R'
[[on-window-detected]]
if.app-id = 'md.obsidian'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = 'move-node-to-workspace B'

[[on-window-detected]]
if.app-id = 'com.figma.Desktop'
run = 'move-node-to-workspace F'

[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = 'move-node-to-workspace M'

[[on-window-detected]]
if.app-id = 'com.swather.app'
run = 'move-node-to-workspace H'

[[on-window-detected]]
if.app-id = 'com.anthropic.claudefordesktop'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'com.cron.electron'
run = 'move-node-to-workspace D'

[[on-window-detected]]
if.app-id = 'com.apple.FaceTime'
run = 'layout floating'
