# Keymap for the Super-Shift-t new-tab directory picker. Navigate with the defaults
# (h/j/k/l + arrows; l/Right enters a dir, h/Left goes up), then:
#   Enter  → enter the hovered directory and quit, writing it to --cwd-file so
#            newtab.sh spawns a zellij tab cwd'd there.
#   q/Esc  → quit WITHOUT writing --cwd-file, so newtab.sh opens nothing (cancel).
# prepend_keymap takes priority over yazi's defaults (whose Enter=open and
# q=quit-and-write-cwd are exactly the behaviours we're replacing here).
[mgr]
prepend_keymap = [
  { on = "<Enter>", run = [ "enter", "quit" ], desc = "Pick hovered dir → new tab" },
  { on = "q", run = "quit --no-cwd-file", desc = "Cancel — no tab" },
  { on = "<Esc>", run = "quit --no-cwd-file", desc = "Cancel — no tab" },
]
