name: check

on:
  push:
    branches: [main]
  pull_request:
  # Let a branch be checked on demand (e.g. before opening a PR) without
  # having to push to main first.
  workflow_dispatch:

jobs:
  eval:
    name: eval the example host
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      # Pure evaluation of the full darwin system — catches syntax errors, bad
      # option names, and broken module wiring before any consumer does. (Eval
      # is platform-independent; no macOS runner needed until we *build*.)
      # Both platforms: the Intel eval guards against anything re-hardcoding
      # aarch64 the way den once did.
      - run: nix eval .#darwinConfigurations.example.system.drvPath
      - run: nix eval .#darwinConfigurations.example-intel.system.drvPath

  shellcheck:
    name: shellcheck bootstrap.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # bootstrap.sh is the standalone curl|bash installer — the one shell
      # script here that isn't a nix template (@PLACEHOLDER@ substitution) or a
      # zsh sketchybar plugin, so it's the one we can lint as-is. Warning level
      # catches real bugs (undefined vars, bad quoting) without failing on
      # info-level style nits. It's what nebelhaus.com/init.sh serves, so a
      # regression here reaches every new installer.
      - name: shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          # bootstrap.sh reaches every new installer via nebelhaus.com/init.sh;
          # haus.sh ships onto every machine as the everyday CLI.
          shellcheck --severity=warning bootstrap.sh modules/den/haus.sh
